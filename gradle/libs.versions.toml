[versions]
kotlin = "1.9.25"  # Use the same minor version of Kotlin as Corda
corda-os = "4.14-20251020.000800-22"
corda-os-shell = "4.14-20251022.004300-36" # for a sample Corddap deployment
corda-ent = "4.14-20251021.004000-3"
tokens-sdk = "1.3.2"
artifactory = "6.0.2"
detekt = "2.0.0-alpha.0"
samples-kotlin = "94f90ceb81cba943f196b9acfba55ade6701f131" # for a sample Corddap deployment refresh to a commit in samples-kotlin repo with amendments for Jitpack

[libraries]
corda = { module = "com.r3.corda:corda", version.ref = "corda-ent" }
corda-core = { module = "net.corda:corda-core", version.ref = "corda-os" }
tokens-contracts = { module = "com.r3.corda.lib.tokens:tokens-contracts", version.ref = "tokens-sdk" }
tokens-workflows = { module = "com.r3.corda.lib.tokens:tokens-workflows", version.ref = "tokens-sdk" }
detekt-ktlint-wrapper = { module = "dev.detekt:detekt-rules-ktlint-wrapper", version.ref = "detekt" }

# Libraries for a sample Corddap deployment
corda-node-api = { module = "com.r3.corda:corda-node-api", version.ref = "corda-ent" }
corda-shell = { module = "net.corda:corda-shell", version.ref = "corda-os-shell" }
# Expliclty added 'stockpaydividend' to the name to denote which Cordapp from samples it is, Jitpack publishes the cordapp as 'samples-kotlin' only
samples-kotlin-stockpaydividend-contracts = { module= "com.github.corda.samples-kotlin:contracts", version.ref = "samples-kotlin" }
samples-kotlin-stockpaydividend-workflows = { module= "com.github.corda.samples-kotlin:workflows", version.ref = "samples-kotlin" }

[plugins]
cordapp = { id = "net.corda.plugins.cordapp", version = "5.1.3" }
cordformation = { id = "net.corda.plugins.cordformation", version = "5.1.1" }
