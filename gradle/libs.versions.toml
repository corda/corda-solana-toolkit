[versions]
kotlin = "1.9.25"  # Use the same minor version of Kotlin as Corda
corda = "4.14-SNAPSHOT"
tokens-sdk = "1.3.2"
artifactory = "6.0.2"
detekt = "2.0.0-alpha.0"
corda-plugin = "5.1.3"

[libraries]
corda-core = { module = "net.corda:corda-core", version.ref = "corda" }
tokens-contracts = { module = "com.r3.corda.lib.tokens:tokens-contracts", version.ref = "tokens-sdk" }
tokens-workflows = { module = "com.r3.corda.lib.tokens:tokens-workflows", version.ref = "tokens-sdk" }
detekt-ktlint-wrapper = { module = "dev.detekt:detekt-rules-ktlint-wrapper", version.ref = "detekt" }
corda-solana-common = { module = "com.r3.corda:corda-solana-common", version.ref = "corda" }
corda-solana-sdk = { module = "com.r3.corda:corda-solana-sdk", version.ref = "corda" }
corda-test-utils = { module = "com.r3.corda:corda-test-utils", version.ref = "corda" }
corda-core-test-utils = { module = "net.corda:corda-core-test-utils", version.ref = "corda" }
corda-node-driver = { module = "com.r3.corda:corda-node-driver", version.ref = "corda" }
quasar-core = { module = "co.paralleluniverse:quasar-core", version = "0.7.6" }

[plugins]
cordapp = { id = "net.corda.plugins.cordapp", version = "5.1.3" }
quasar-utils = { id = "net.corda.plugins.quasar-utils", version.ref = "corda-plugin" }
