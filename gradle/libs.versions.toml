[versions]
kotlin = "1.9.25"  # Use the same minor version of Kotlin as Corda
corda-os = "4.14-20251020.000800-22"
corda-os-shell = "4.14-20251022.004300-36" # for a sample Corddap deployment
corda-ent = "4.14-20251021.004000-3"
tokens-sdk = "1.3.2"
artifactory = "6.0.2"
detekt = "2.0.0-alpha.0"
corda-plugin = "5.1.3"

[libraries]
corda-node = { module = "net.corda:corda", version.ref = "corda-os" }
corda-core = { module = "net.corda:corda-core", version.ref = "corda-os" }
tokens-contracts = { module = "com.r3.corda.lib.tokens:tokens-contracts", version.ref = "tokens-sdk" }
tokens-workflows = { module = "com.r3.corda.lib.tokens:tokens-workflows", version.ref = "tokens-sdk" }
detekt-ktlint-wrapper = { module = "dev.detekt:detekt-rules-ktlint-wrapper", version.ref = "detekt" }
corda-solana-common = { module = "com.r3.corda:corda-solana-common", version.ref = "corda-ent" }
corda-solana-sdk = { module = "com.r3.corda:corda-solana-sdk", version.ref = "corda-ent" }
corda-test-utils = { module = "com.r3.corda:corda-test-utils", version.ref = "corda-ent" }
corda-core-test-utils = { module = "net.corda:corda-core-test-utils", version.ref = "corda-os" }
corda-node-driver = { module = "com.r3.corda:corda-node-driver", version.ref = "corda-ent" }
quasar-core = { module = "co.paralleluniverse:quasar-core", version = "0.7.6" }
mockito-core = { module = "org.mockito:mockito-core", version = "5.5.0" } # ledger unit tests

# Libraries for a sample Corddap deployment
corda-node-api = { module = "net.corda:corda-node-api", version.ref = "corda-os" }
corda-shell = { module = "net.corda:corda-shell", version.ref = "corda-os-shell" }

[plugins]
cordapp = { id = "net.corda.plugins.cordapp", version = "5.1.3" }
quasar-utils = { id = "net.corda.plugins.quasar-utils", version.ref = "corda-plugin" }
cordformation = { id = "net.corda.plugins.cordformation", version = "5.1.1" }
